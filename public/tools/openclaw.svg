<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ocGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5E5B"/>
      <stop offset="100%" stop-color="#2EC4B6"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="16" fill="#0D1117"/>
  <!-- Round mascot body -->
  <circle cx="40" cy="32" r="14" fill="#FF5E5B"/>
  <!-- Eyes -->
  <circle cx="35" cy="30" r="2.5" fill="#0D1117"/>
  <circle cx="45" cy="30" r="2.5" fill="#0D1117"/>
  <!-- Antennae -->
  <line x1="36" y1="18" x2="34" y2="12" stroke="#FF5E5B" stroke-width="2" stroke-linecap="round"/>
  <circle cx="34" cy="11" r="2" fill="#FF5E5B"/>
  <line x1="44" y1="18" x2="46" y2="12" stroke="#FF5E5B" stroke-width="2" stroke-linecap="round"/>
  <circle cx="46" cy="11" r="2" fill="#FF5E5B"/>
  <!-- Legs -->
  <line x1="33" y1="45" x2="30" y2="52" stroke="#FF5E5B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="45" x2="50" y2="52" stroke="#FF5E5B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- OpenClaw text -->
  <text x="40" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="10" fill="url(#ocGrad)">OpenClaw</text>
</svg>
